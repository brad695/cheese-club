<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Greys Cheese Club — Monthly Artisan Cheese Subscriptions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#faf6ef; --paper:#fffdf9; --ink:#2b241d; --muted:#6f6557;
  --gold:#b08442; --gold-d:#8a6630; --wine:#5e3a5e; --rust:#8c3b2e;
  --line:#e7ddcd; --shadow:0 1px 2px rgba(43,36,29,.06),0 8px 28px rgba(43,36,29,.08);
  --radius:16px;
}
*{box-sizing:border-box}
body{margin:0;background:var(--cream);color:var(--ink);font-family:Inter,system-ui,sans-serif;line-height:1.55;-webkit-font-smoothing:antialiased}
h1,h2,h3,h4{font-family:Fraunces,Georgia,serif;font-weight:600;line-height:1.1;margin:0 0 .4em}
a{color:inherit}
img{max-width:100%}
.wrap{max-width:1140px;margin:0 auto;padding:0 22px}
.btn{display:inline-flex;align-items:center;gap:8px;border:none;border-radius:999px;padding:12px 22px;font:600 15px Inter,sans-serif;cursor:pointer;text-decoration:none;transition:.15s;white-space:nowrap}
.btn-primary{background:var(--gold);color:#fff}
.btn-primary:hover{background:var(--gold-d)}
.btn-ghost{background:transparent;border:1.5px solid var(--line);color:var(--ink)}
.btn-ghost:hover{border-color:var(--gold)}
.btn-sm{padding:8px 14px;font-size:13px}
.btn-danger{background:#fff;border:1.5px solid #e0c2bd;color:var(--rust)}
.btn-danger:hover{background:#fbeeec}
.btn:disabled{opacity:.5;cursor:not-allowed}
/* header */
header.nav{position:sticky;top:0;z-index:50;background:rgba(250,246,239,.85);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.nav-in{display:flex;align-items:center;justify-content:space-between;height:68px}
.brand{display:flex;align-items:center;gap:11px;cursor:pointer}
.brand .mark{width:38px;height:38px;border-radius:50%;background:radial-gradient(circle at 32% 30%,#f4d99a,#b08442);display:grid;place-items:center;color:#5b3e16;font:700 18px Fraunces,serif;box-shadow:inset 0 0 0 2px rgba(255,255,255,.4)}
.brand b{font:600 19px Fraunces,serif;letter-spacing:.2px}
.brand small{display:block;font:500 10px Inter;letter-spacing:.18em;color:var(--muted);text-transform:uppercase;margin-top:-2px}
.nav-links{display:flex;align-items:center;gap:8px}
.nav-links a{font-weight:500;color:var(--muted);padding:8px 12px;border-radius:8px;cursor:pointer;font-size:14px}
.nav-links a:hover{color:var(--ink)}
/* hero */
.hero{padding:74px 0 56px;text-align:center;background:radial-gradient(1200px 380px at 50% -120px,#fff5e1 0,transparent 70%)}
.eyebrow{display:inline-block;font:600 12px Inter;letter-spacing:.18em;text-transform:uppercase;color:var(--gold-d);background:#fff;border:1px solid var(--line);padding:7px 14px;border-radius:999px;margin-bottom:22px}
.hero h1{font-size:clamp(38px,6vw,68px);max-width:14ch;margin-inline:auto}
.hero p{font-size:19px;color:var(--muted);max-width:56ch;margin:18px auto 30px}
.hero .cta{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.trust{margin-top:40px;color:var(--muted);font-size:13px;letter-spacing:.04em}
/* sections */
section{padding:56px 0}
.sec-head{text-align:center;max-width:60ch;margin:0 auto 40px}
.sec-head h2{font-size:clamp(28px,4vw,42px)}
.sec-head p{color:var(--muted);font-size:17px}
/* club cards */
.clubs{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}
.club{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);padding:28px;display:flex;flex-direction:column;box-shadow:var(--shadow);position:relative;transition:.18s}
.club:hover{transform:translateY(-3px);border-color:#dcc9a6}
.club.featured{border-color:var(--gold);box-shadow:0 10px 36px rgba(176,132,66,.18)}
.club .badge{position:absolute;top:-12px;left:50%;transform:translateX(-50%);background:var(--gold);color:#fff;font:600 11px Inter;letter-spacing:.1em;text-transform:uppercase;padding:6px 14px;border-radius:999px}
.club .badge.premium{background:var(--wine)}
.club .swatch{height:6px;width:54px;border-radius:99px;margin-bottom:18px}
.club h3{font-size:25px}
.club .tag{color:var(--muted);font-size:14px;min-height:42px}
.price{margin:16px 0 6px;font-family:Fraunces;font-size:40px;font-weight:600}
.price span{font:500 15px Inter;color:var(--muted)}
.club ul{list-style:none;padding:0;margin:16px 0 22px;font-size:14px}
.club ul li{padding:7px 0 7px 26px;position:relative;border-top:1px dashed var(--line)}
.club ul li:before{content:"";position:absolute;left:2px;top:13px;width:9px;height:9px;border-radius:50%;background:var(--gold)}
.club .btn{margin-top:auto;justify-content:center}
/* how it works */
.steps{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}
.step{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);padding:24px}
.step .n{width:34px;height:34px;border-radius:50%;background:#f3e8d3;color:var(--gold-d);display:grid;place-items:center;font:700 15px Fraunces;margin-bottom:14px}
.step h4{font-size:18px}
.step p{color:var(--muted);font-size:14px;margin:0}
/* generic card / panels */
.card{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);padding:26px;box-shadow:var(--shadow)}
.grid2{display:grid;grid-template-columns:1.3fr .9fr;gap:24px;align-items:start}
label.fld{display:block;margin:0 0 14px}
label.fld span{display:block;font-weight:600;font-size:13px;margin-bottom:6px}
input,select,textarea{width:100%;padding:11px 13px;border:1.5px solid var(--line);border-radius:10px;font:400 15px Inter;background:#fff;color:var(--ink)}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--gold)}
.radio-row{display:flex;flex-direction:column;gap:10px}
.opt{display:flex;align-items:center;gap:12px;border:1.5px solid var(--line);border-radius:12px;padding:13px 15px;cursor:pointer}
.opt:hover{border-color:#dcc9a6}
.opt.sel{border-color:var(--gold);background:#fff8ec}
.opt input{width:auto}
.opt .meta{flex:1}
.opt .meta b{font-size:15px}
.opt .meta small{display:block;color:var(--muted)}
.opt .amt{font-weight:600;color:var(--gold-d)}
.summary{position:sticky;top:90px}
.summary .row{display:flex;justify-content:space-between;padding:8px 0;font-size:15px;border-top:1px dashed var(--line)}
.summary .row.total{border-top:2px solid var(--line);margin-top:6px;padding-top:14px;font-weight:700;font-size:19px;font-family:Fraunces}
.tabs{display:flex;gap:6px;border-bottom:1px solid var(--line);margin-bottom:24px;flex-wrap:wrap}
.tabs button{background:none;border:none;padding:12px 16px;font:600 14px Inter;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px}
.tabs button.on{color:var(--ink);border-bottom-color:var(--gold)}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:26px}
.metric{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:18px}
.metric .k{font:600 12px Inter;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)}
.metric .v{font:600 30px Fraunces;margin-top:4px}
table{width:100%;border-collapse:collapse;font-size:14px}
th{text-align:left;font:600 12px Inter;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);padding:10px 12px;border-bottom:1px solid var(--line)}
td{padding:11px 12px;border-bottom:1px solid var(--line);vertical-align:top}
tr:hover td{background:#fffaf0}
.pill{display:inline-block;padding:3px 10px;border-radius:999px;font:600 12px Inter}
.pill.active{background:#e6f3e7;color:#2f7d3a}
.pill.paused{background:#fbf0d8;color:#996c12}
.pill.cancelled{background:#f2e3e1;color:#9a4034}
.pill.scheduled{background:#eef1f6;color:#46546e}
.pill.skipped{background:#efe9df;color:#6f6557}
.pill.paid{background:#e6f3e7;color:#2f7d3a}
.empty{text-align:center;color:var(--muted);padding:50px 20px}
.sub-card{border:1px solid var(--line);border-radius:14px;padding:20px;margin-bottom:16px;background:var(--paper)}
.sub-card .top{display:flex;justify-content:space-between;align-items:start;gap:12px;flex-wrap:wrap}
.sub-card h3{margin:0;font-size:21px}
.sub-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}
.note{background:#fff8ec;border:1px solid #ecd9b3;border-radius:12px;padding:14px 16px;font-size:14px;color:#6b5326}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(120%);background:var(--ink);color:#fff;padding:13px 22px;border-radius:999px;font-weight:500;box-shadow:var(--shadow);z-index:200;transition:transform .3s;max-width:90vw}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.err{background:var(--rust)}
.modal-bg{position:fixed;inset:0;background:rgba(43,36,29,.45);display:none;place-items:center;z-index:100;padding:20px}
.modal-bg.show{display:grid}
.modal{background:var(--paper);border-radius:var(--radius);padding:30px;max-width:430px;width:100%;box-shadow:var(--shadow)}
.modal h3{font-size:24px}
.seg{display:flex;background:#f3ecdf;border-radius:10px;padding:4px;margin-bottom:18px}
.seg button{flex:1;border:none;background:none;padding:9px;border-radius:7px;font:600 14px Inter;color:var(--muted);cursor:pointer}
.seg button.on{background:#fff;color:var(--ink);box-shadow:var(--shadow)}
footer{border-top:1px solid var(--line);padding:34px 0;color:var(--muted);font-size:13px;text-align:center;margin-top:40px}
.muted{color:var(--muted)}
.center{text-align:center}
.hidden{display:none!important}
@media(max-width:880px){.clubs,.steps,.metrics{grid-template-columns:1fr}.grid2{grid-template-columns:1fr}.metrics{grid-template-columns:repeat(2,1fr)}.nav-links a.hideable{display:none}.table-scroll{overflow-x:auto}}
</style>
</head>
<body>
<header class="nav"><div class="wrap nav-in">
  <div class="brand" onclick="go('/')">
    <div class="mark">G</div>
    <div><b>Greys Cheese Club</b><small>Memphis · Nashville · Franklin</small></div>
  </div>
  <nav class="nav-links" id="navLinks"></nav>
</div></header>

<main id="app"></main>

<footer><div class="wrap">
  Greys Cheese Club · A monthly artisan cheese subscription · <span class="muted">Demo storefront — placeholder pricing</span>
</div></footer>

<div class="toast" id="toast"></div>
<div class="modal-bg" id="modalBg"><div class="modal" id="modal"></div></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
/* ====== CONFIG ====== */
const SUPABASE_URL = "https://vdvtrevhqalmjwhjhjug.supabase.co";
const SUPABASE_KEY = "sb_publishable_LnlevWReed7K8cFk_f_Mxg_UywktQ5_";
// Flip to true once you've added your Stripe test keys (see README). When false,
// checkout activates the membership instantly in "demo" mode so the whole site works end-to-end.
const STRIPE_ENABLED = false;
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* ====== STATE ====== */
const S = { session:null, member:null, clubs:[], fulfillment:[], cohorts:[], draft:null };
const money = c => "$" + (c/100).toFixed(0);
const money2 = c => "$" + (c/100).toFixed(2);
const $ = (h)=>{const t=document.createElement('template');t.innerHTML=h.trim();return t.content.firstElementChild;};
function toast(msg,err){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show'+(err?' err':'');setTimeout(()=>t.className='toast',3200);}
function go(path){location.hash = '#'+path;}
function esc(s){return (s??'').toString().replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

/* ====== DATA ====== */
async function loadCatalog(){
  if(S.clubs.length) return;
  const [c,f,co] = await Promise.all([
    sb.from('cc_clubs').select('*').eq('active',true).order('sort_order'),
    sb.from('cc_fulfillment_options').select('*').eq('active',true).order('sort_order'),
    sb.from('cc_cohorts').select('*').order('month')
  ]);
  S.clubs=c.data||[]; S.fulfillment=f.data||[]; S.cohorts=co.data||[];
}
function nextCohort(){ const today=new Date().toISOString().slice(0,10); return S.cohorts.find(c=>c.order_deadline>=today)||S.cohorts[S.cohorts.length-1]; }
async function refreshMember(){
  if(!S.session){S.member=null;return;}
  const {data}=await sb.from('cc_members').select('*').eq('id',S.session.user.id).maybeSingle();
  S.member=data;
}

/* ====== AUTH ====== */
async function doSignup(email,password,full_name,phone){
  const r = await fetch(SUPABASE_URL+'/functions/v1/cc-signup',{
    method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+SUPABASE_KEY,'apikey':SUPABASE_KEY},
    body:JSON.stringify({email,password,full_name,phone})
  });
  const j = await r.json();
  if(!r.ok || j.error) throw new Error(j.error||'Could not create account.');
  const {error}=await sb.auth.signInWithPassword({email,password});
  if(error) throw error;
}
async function doLogin(email,password){
  const {error}=await sb.auth.signInWithPassword({email,password});
  if(error) throw new Error('Incorrect email or password.');
}
async function logout(){ await sb.auth.signOut(); S.session=null;S.member=null; go('/'); toast('Signed out.'); }

/* ====== ROUTER ====== */
async function render(){
  await loadCatalog();
  renderNav();
  const hash = location.hash.replace(/^#/,'')||'/';
  const [_,seg,arg] = hash.split('/');
  const app = document.getElementById('app');
  window.scrollTo(0,0);
  if(!seg){ app.innerHTML=''; app.append(viewHome()); return; }
  if(seg==='join'){ app.innerHTML=''; app.append(viewJoin(arg)); return; }
  if(seg==='account'){ if(!S.session) return go('/login'); await refreshMember(); app.innerHTML=''; app.append(await viewAccount()); return; }
  if(seg==='admin'){ if(!S.session) return go('/login'); await refreshMember(); if(!S.member?.is_admin){app.innerHTML='';app.append(viewNoAdmin());return;} app.innerHTML=''; app.append(await viewAdmin()); return; }
  if(seg==='login'){ app.innerHTML=''; app.append(viewLogin()); return; }
  app.innerHTML=''; app.append(viewHome());
}
function renderNav(){
  const n=document.getElementById('navLinks');
  n.innerHTML='';
  n.append($(`<a class="hideable" onclick="go('/')">The Clubs</a>`));
  if(S.session){
    if(S.member?.is_admin) n.append($(`<a onclick="go('/admin')">Partner Portal</a>`));
    n.append($(`<a onclick="go('/account')">My Membership</a>`));
    n.append($(`<a class="btn btn-ghost btn-sm" onclick="logout()">Sign out</a>`));
  }else{
    n.append($(`<a onclick="go('/login')">Sign in</a>`));
    n.append($(`<a class="btn btn-primary btn-sm" onclick="go('/')">Join a club</a>`));
  }
}

/* ====== VIEW: HOME ====== */
function viewHome(){
  const el=$(`<div></div>`);
  el.append($(`
  <div class="hero"><div class="wrap">
    <span class="eyebrow">Cheese with soul & story</span>
    <h1>A hand-picked cheese box, at your door every month.</h1>
    <p>Our cheesemongers cut to order and curate a new selection each month — with tasting notes so you can taste like a pro at home. Pick a club, pick a pickup spot or delivery, and we handle the rest.</p>
    <div class="cta">
      <a class="btn btn-primary" onclick="document.getElementById('clubs').scrollIntoView({behavior:'smooth'})">Choose your club →</a>
      <a class="btn btn-ghost" onclick="go('/login')">I'm already a member</a>
    </div>
    <div class="trust">Cancel, skip, or pause anytime · Pickup in Memphis, Nashville & Franklin · Local delivery available</div>
  </div></div>`));

  const clubsWrap=$(`<section id="clubs"><div class="wrap"><div class="sec-head"><h2>Find your club</h2><p>Three ways to taste your way through the world of artisan cheese. Every membership is month-to-month.</p></div><div class="clubs"></div></div></section>`);
  const grid=clubsWrap.querySelector('.clubs');
  S.clubs.forEach(c=>{
    const feat = c.is_base || c.badge==='Most popular';
    const card=$(`<div class="club ${feat?'featured':''}">
      ${c.badge?`<div class="badge ${c.badge==='Premium'?'premium':''}">${esc(c.badge)}</div>`:''}
      <div class="swatch" style="background:${esc(c.accent||'#b08442')}"></div>
      <h3>${esc(c.name)}</h3>
      <div class="tag">${esc(c.tagline||'')}</div>
      <div class="price">${money(c.monthly_price_cents)}<span>/month</span></div>
      <ul>${(c.whats_inside||'').split(',').map(x=>`<li>${esc(x.trim())}</li>`).join('')}</ul>
      <button class="btn btn-primary" onclick="go('/join/${c.slug}')">Join ${esc(c.name.replace(/ Club.*/,''))}</button>
    </div>`);
    grid.append(card);
  });
  el.append(clubsWrap);

  el.append($(`
  <section style="background:var(--paper);border-top:1px solid var(--line);border-bottom:1px solid var(--line)"><div class="wrap">
    <div class="sec-head"><h2>How it works</h2><p>Set it up once. We take care of the rest, every month.</p></div>
    <div class="steps">
      <div class="step"><div class="n">1</div><h4>Choose a club</h4><p>Pick the experience that fits you and how you'd like to receive it.</p></div>
      <div class="step"><div class="n">2</div><h4>We curate</h4><p>Each month our cheesemongers select and cut a fresh lineup with tasting notes.</p></div>
      <div class="step"><div class="n">3</div><h4>Pick up or delivered</h4><p>Grab it at your store on fulfillment day, or have it delivered locally.</p></div>
      <div class="step"><div class="n">4</div><h4>Stay in control</h4><p>Skip a month, pause, switch clubs, or cancel anytime from your member portal.</p></div>
    </div>
  </div></section>`));
  return el;
}

/* ====== VIEW: JOIN / CHECKOUT ====== */
function viewJoin(slug){
  const club = S.clubs.find(c=>c.slug===slug);
  if(!club){const e=$(`<div class="wrap" style="padding:60px 0"><div class="empty">Club not found. <a onclick="go('/')">Back to clubs</a></div></div>`);return e;}
  if(!S.draft || S.draft.club_id!==club.id){
    S.draft={club_id:club.id, fulfillment_id:(S.fulfillment[0]||{}).id, is_gift:false, gift_sender_name:'', gift_recipient_email:'', gift_note:'', delivery_instructions:''};
  }
  const el=$(`<div class="wrap" style="padding:40px 0 70px"></div>`);
  el.append($(`<a class="muted" style="cursor:pointer;font-size:14px" onclick="go('/')">← All clubs</a>`));
  el.append($(`<h1 style="margin:14px 0 4px">Join ${esc(club.name)}</h1><p class="muted" style="margin-top:0;max-width:60ch">${esc(club.description||'')}</p>`));

  const grid=$(`<div class="grid2" style="margin-top:26px"></div>`);
  const left=$(`<div></div>`);
  // fulfillment
  const fcard=$(`<div class="card" style="margin-bottom:22px"><h3 style="font-size:20px">How would you like to receive it?</h3><div class="radio-row" id="ffr"></div></div>`);
  const ffr=fcard.querySelector('#ffr');
  S.fulfillment.forEach(f=>{
    const sel=S.draft.fulfillment_id===f.id;
    const o=$(`<label class="opt ${sel?'sel':''}">
      <input type="radio" name="ff" ${sel?'checked':''}>
      <div class="meta"><b>${esc(f.label)}</b><small>${esc(f.address||'')}</small></div>
      <div class="amt">${f.surcharge_cents?'+'+money(f.surcharge_cents):'Included'}</div>
    </label>`);
    o.addEventListener('click',()=>{S.draft.fulfillment_id=f.id; el.replaceWith(viewJoin(slug));});
    ffr.append(o);
  });
  left.append(fcard);
  // delivery instructions if delivery
  const ff=S.fulfillment.find(x=>x.id===S.draft.fulfillment_id);
  if(ff&&ff.type==='delivery'){
    const d=$(`<div class="card" style="margin-bottom:22px"><label class="fld"><span>Delivery instructions (optional)</span><textarea rows="2" id="dins" placeholder="Gate code, where to leave it, etc.">${esc(S.draft.delivery_instructions)}</textarea></label></div>`);
    d.querySelector('#dins').addEventListener('input',e=>S.draft.delivery_instructions=e.target.value);
    left.append(d);
  }
  // gift
  const gcard=$(`<div class="card" style="margin-bottom:22px"><label class="opt ${S.draft.is_gift?'sel':''}" style="margin-bottom:${S.draft.is_gift?'16px':'0'}"><input type="checkbox" id="giftck" ${S.draft.is_gift?'checked':''}><div class="meta"><b>This is a gift 🎁</b><small>We'll send the recipient a welcome note.</small></div></label><div id="giftfields"></div></div>`);
  gcard.querySelector('#giftck').addEventListener('change',e=>{S.draft.is_gift=e.target.checked; el.replaceWith(viewJoin(slug));});
  if(S.draft.is_gift){
    const gf=gcard.querySelector('#giftfields');
    gf.append($(`<label class="fld"><span>Your name (gift sender)</span><input id="gsn" value="${esc(S.draft.gift_sender_name)}"></label>`));
    gf.append($(`<label class="fld"><span>Recipient email</span><input id="gre" type="email" value="${esc(S.draft.gift_recipient_email)}"></label>`));
    gf.append($(`<label class="fld"><span>Gift note</span><textarea rows="2" id="gnt">${esc(S.draft.gift_note)}</textarea></label>`));
    gf.querySelector('#gsn').addEventListener('input',e=>S.draft.gift_sender_name=e.target.value);
    gf.querySelector('#gre').addEventListener('input',e=>S.draft.gift_recipient_email=e.target.value);
    gf.querySelector('#gnt').addEventListener('input',e=>S.draft.gift_note=e.target.value);
  }
  left.append(gcard);

  // auth / confirm
  const authCard=$(`<div class="card" id="authCard"></div>`);
  left.append(authCard);
  renderJoinAuth(authCard, club, slug);
  grid.append(left);

  // summary

async function completeCheckout(club, btn){
  if(btn){btn.disabled=true;btn.textContent='Starting…';}
  // Stripe (test mode) path — used only when enabled AND configured on the backend.
  if(STRIPE_ENABLED){
    try{
      const {data:{session}}=await sb.auth.getSession();
      const r=await fetch(SUPABASE_URL+'/functions/v1/cc-checkout',{
        method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+session.access_token,'apikey':SUPABASE_KEY},
        body:JSON.stringify({club_id:club.id,fulfillment_option_id:S.draft.fulfillment_id,origin:location.origin+location.pathname})
      });
      const j=await r.json();
      if(j.url){ location.href=j.url; return; }      // -> Stripe Checkout; webhook provisions on success
      // j.configured===false -> fall through to instant activation
    }catch(e){ /* fall through to demo activation */ }
  }
  try{
    const ff=S.fulfillment.find(x=>x.id===S.draft.fulfillment_id);
    const surcharge=ff?ff.surcharge_cents:0;
    const amount=club.monthly_price_cents+surcharge;
    const {data:sub,error}=await sb.from('cc_subscriptions').insert({
      member_id:S.session.user.id, club_id:club.id, fulfillment_option_id:S.draft.fulfillment_id,
      delivery_instructions:S.draft.delivery_instructions||null,
      is_gift:S.draft.is_gift, gift_sender_name:S.draft.is_gift?S.draft.gift_sender_name:null,
      gift_recipient_email:S.draft.is_gift?S.draft.gift_recipient_email:null, gift_note:S.draft.is_gift?S.draft.gift_note:null
    }).select().single();
    if(error) throw error;
    const nc=nextCohort();
    if(nc){ await sb.from('cc_orders').insert({subscription_id:sub.id,cohort_id:nc.id,amount_cents:amount,status:'scheduled'}); }
    S.draft=null;
    showWelcome(club);
  }catch(e){ toast(e.message||'Something went wrong.',true); if(btn){btn.disabled=false;btn.textContent='Start my subscription →';} }
}

  tabs.querySelectorAll('button').forEach(btn=>btn.addEventListener('click',()=>{tabs.querySelectorAll('button').forEach(x=>x.classList.remove('on'));btn.classList.add('on');({ov:drawOv,subs:drawSubs,members:drawMembers,cohorts:drawCohorts,orders:drawOrders}[btn.dataset.t])();}));
  drawOv();
  return el;
}
function viewNoAdmin(){return $(`<div class="wrap" style="padding:60px 0"><div class="empty">This area is for store operators only.<br><br><a class="btn btn-primary" onclick="go('/account')">Go to my membership</a></div></div>`);}

})();
