<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Greys Fine Cheeses — Cheese Club</title>
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#ffffff; --alt:#f7f6f3; --paper:#ffffff; --ink:#2f3b45; --muted:#6b7480;
  --green:#1f5137; --green-d:#163b28; --gold:#c99a3f; --wine:#5e3a5e; --rust:#8c3b2e;
  --line:#e7e4dd; --shadow:0 1px 2px rgba(31,42,45,.05),0 10px 30px rgba(31,42,45,.07);
  --radius:14px;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:Inter,system-ui,sans-serif;line-height:1.55;-webkit-font-smoothing:antialiased}
h1,h2,h3,h4{font-family:Fraunces,Georgia,serif;font-weight:600;line-height:1.15;margin:0 0 .4em}
a{color:inherit}
img{max-width:100%;display:block}
.wrap{max-width:1080px;margin:0 auto;padding:0 22px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;border-radius:999px;padding:12px 22px;font:600 15px Inter,sans-serif;cursor:pointer;text-decoration:none;transition:.15s;white-space:nowrap}
.btn-primary{background:var(--green);color:#fff}
.btn-primary:hover{background:var(--green-d)}
.btn-ghost{background:transparent;border:1.5px solid var(--line);color:var(--ink)}
.btn-ghost:hover{border-color:var(--green)}
.btn-sm{padding:8px 14px;font-size:13px}
.btn-danger{background:#fff;border:1.5px solid #e0c2bd;color:var(--rust)}
.btn-danger:hover{background:#fbeeec}
.btn:disabled{opacity:.5;cursor:not-allowed}
header.nav{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.nav-in{display:flex;align-items:center;justify-content:space-between;height:66px;gap:14px}
.brand{display:flex;align-items:center;gap:10px;cursor:pointer}
.brand img{height:30px;width:auto}
.brand .fallback{font:700 20px Fraunces,serif;letter-spacing:.12em;color:var(--ink)}
.nav-links{display:flex;align-items:center;gap:6px}
.nav-links a{font-weight:500;color:var(--muted);padding:8px 12px;border-radius:8px;cursor:pointer;font-size:14px}
.nav-links a:hover{color:var(--ink)}
/* rating + gallery */
.rating{display:flex;align-items:center;gap:8px;justify-content:center;color:var(--muted);font-size:14px;padding:26px 0 18px}
.stars{color:var(--gold);letter-spacing:2px;font-size:16px}
.gallery{display:grid;grid-auto-flow:column;grid-auto-columns:minmax(230px,1fr);gap:10px;overflow-x:auto;padding:2px 0 8px;scroll-snap-type:x mandatory}
.gallery img{width:100%;height:230px;object-fit:cover;border-radius:12px;scroll-snap-align:start;background:var(--alt)}
/* centered club cards */
.home-head{text-align:center;margin:8px auto 26px;max-width:60ch}
.home-head h2{font-size:clamp(26px,4vw,34px)}
.home-head p{color:var(--muted);margin:6px auto 0}
.clubgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;max-width:1040px;margin:0 auto}
.ccard{border:1px solid var(--line);border-radius:16px;overflow:hidden;display:flex;flex-direction:column;background:#fff;box-shadow:var(--shadow);transition:.15s}
.ccard:hover{transform:translateY(-3px)}
.ccimg{position:relative;background:var(--alt)}
.ccimg img{width:100%;height:170px;object-fit:cover;display:block}
.cbadge{position:absolute;top:12px;left:12px;background:var(--green);color:#fff;font:600 10px Inter;letter-spacing:.08em;text-transform:uppercase;padding:4px 10px;border-radius:99px}
.ccard.wine .cbadge{background:#5e7a3a}
.ccard .body{padding:18px;display:flex;flex-direction:column;flex:1}
.ccard h3{font-size:19px;margin:0 0 4px}
.cprice{font:600 24px Fraunces;margin-bottom:8px}
.cprice span{font:500 13px Inter;color:var(--muted)}
.cdesc{color:#4a545e;font-size:13px;line-height:1.5;margin:0 0 12px}
.cavail{font-size:11px;font-weight:600;color:var(--green);background:#eaf2ec;border-radius:99px;padding:4px 10px;align-self:flex-start;margin-bottom:14px}
.ccard.wine .cavail{color:#5e7a3a;background:#eef3e6}
.cbtn{margin-top:auto;width:100%}
.homesec{max-width:780px;margin:48px auto 0}
.homesec h2{font-size:24px;text-align:center;margin-bottom:14px}
@media(max-width:900px){.clubgrid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:520px){.clubgrid{grid-template-columns:1fr}}
/* layout */
.layout{display:grid;grid-template-columns:1fr 400px;gap:38px;align-items:start;padding:34px 0 90px}
.sec{margin-bottom:34px}
.sec h2{font-size:24px;margin-bottom:12px}
.sec p{color:#4a545e}
.overview-box{background:var(--alt);border-radius:12px;padding:20px 22px;color:#4a545e}
.supporting{display:flex;gap:18px;align-items:center;flex-wrap:wrap}
.supporting img{width:260px;height:200px;object-fit:cover;border-radius:12px}
.supporting .txt{flex:1;min-width:220px;color:#4a545e}
.steps{display:flex;flex-direction:column;gap:16px}
.step{display:flex;gap:14px}
.step .n{flex:none;width:32px;height:32px;border-radius:50%;background:#e7efe9;color:var(--green);display:grid;place-items:center;font:700 15px Fraunces}
.step h4{font-size:17px;margin:2px 0 3px}
.step p{margin:0;font-size:14px}
.perks{list-style:none;padding:0;margin:0}
.perks li{padding:10px 0 10px 30px;position:relative;border-top:1px solid var(--line);color:#4a545e}
.perks li:first-child{border-top:none}
.perks li:before{content:"✓";position:absolute;left:2px;top:9px;color:var(--green);font-weight:700}
.know{display:flex;gap:22px;flex-wrap:wrap;color:#4a545e;font-size:14px}
.know div{display:flex;flex-direction:column}
.know b{color:var(--ink);font-family:Fraunces;font-size:16px}
/* membership selector */
.membership{position:sticky;top:88px;border:1px solid var(--line);border-radius:16px;padding:22px;box-shadow:var(--shadow);background:#fff}
.membership h3{font-size:20px;margin-bottom:14px}
.plan{border:1.5px solid var(--line);border-radius:12px;padding:15px 16px;margin-bottom:12px;cursor:pointer;transition:.15s;position:relative}
.plan:hover{border-color:#cdd6cf}
.plan.sel{border-color:var(--green);background:#f4f9f5;box-shadow:0 0 0 1px var(--green) inset}
.plan .ph{display:flex;justify-content:space-between;align-items:center;gap:10px}
.plan .ph b{font-size:16px}
.plan .price{font:600 17px Fraunces;color:var(--ink)}
.plan .desc{color:var(--muted);font-size:13px;margin-top:6px;line-height:1.45}
.plan .avail{display:inline-block;margin-top:8px;font-size:11px;font-weight:600;color:var(--green);background:#eaf2ec;border-radius:99px;padding:3px 9px}
.plan .badge{position:absolute;top:-10px;right:14px;background:var(--green);color:#fff;font:600 10px Inter;letter-spacing:.08em;text-transform:uppercase;padding:4px 10px;border-radius:99px}
.plan.wine .avail{color:#5e7a3a;background:#eef3e6}
.cta-btn{width:100%;margin-top:6px}
.subnote{text-align:center;color:var(--muted);font-size:12px;margin-top:10px}
/* generic */
.card{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow)}
.grid2{display:grid;grid-template-columns:1.3fr .9fr;gap:24px;align-items:start}
label.fld{display:block;margin:0 0 14px}
label.fld span{display:block;font-weight:600;font-size:13px;margin-bottom:6px}
input,select,textarea{width:100%;padding:11px 13px;border:1.5px solid var(--line);border-radius:10px;font:400 15px Inter;background:#fff;color:var(--ink)}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--green)}
.radio-row{display:flex;flex-direction:column;gap:10px}
.opt{display:flex;align-items:center;gap:12px;border:1.5px solid var(--line);border-radius:12px;padding:13px 15px;cursor:pointer}
.opt:hover{border-color:#cdd6cf}
.opt.sel{border-color:var(--green);background:#f4f9f5}
.opt.disabled{opacity:.65;cursor:not-allowed;background:#faf9f6}
.opt.disabled:hover{border-color:var(--line)}
.opt .soon{font-weight:600;color:var(--muted);font-size:12px;background:#efece6;border-radius:99px;padding:4px 10px;white-space:nowrap}
.opt input{width:auto}
.opt .meta{flex:1}
.opt .meta b{font-size:15px}
.opt .meta small{display:block;color:var(--muted)}
.opt .amt{font-weight:600;color:var(--green)}
.summary{position:sticky;top:88px}
.summary .row{display:flex;justify-content:space-between;padding:8px 0;font-size:15px;border-top:1px dashed var(--line)}
.summary .row.total{border-top:2px solid var(--line);margin-top:6px;padding-top:14px;font-weight:700;font-size:19px;font-family:Fraunces}
.tabs{display:flex;gap:6px;border-bottom:1px solid var(--line);margin-bottom:24px;flex-wrap:wrap}
.tabs button{background:none;border:none;padding:12px 16px;font:600 14px Inter;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px}
.tabs button.on{color:var(--ink);border-bottom-color:var(--green)}
/* admin sidebar layout — menu on the left */
.admin-shell{display:grid;grid-template-columns:212px 1fr;gap:28px;align-items:start;margin-top:22px}
.admin-nav{position:sticky;top:88px;display:flex;flex-direction:column;gap:2px;border:1px solid var(--line);border-radius:14px;padding:8px;background:var(--paper);box-shadow:var(--shadow)}
.admin-nav button{display:flex;align-items:center;gap:11px;width:100%;text-align:left;background:none;border:none;padding:10px 13px;border-radius:10px;font:600 14px Inter;color:var(--muted);cursor:pointer;transition:.12s}
.admin-nav button:hover{background:var(--alt);color:var(--ink)}
.admin-nav button.on{background:#eef4ef;color:var(--green)}
.admin-nav button .ico{font-size:16px;width:20px;text-align:center;flex:none}
.admin-main{min-width:0}
@media(max-width:860px){.admin-shell{grid-template-columns:1fr;gap:16px}.admin-nav{position:static;top:auto;flex-direction:row;flex-wrap:wrap}.admin-nav button{width:auto}}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:26px}
.metric{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:18px}
.metric .k{font:600 12px Inter;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)}
.metric .v{font:600 30px Fraunces;margin-top:4px}
table{width:100%;border-collapse:collapse;font-size:14px}
th{text-align:left;font:600 12px Inter;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);padding:10px 12px;border-bottom:1px solid var(--line)}
td{padding:11px 12px;border-bottom:1px solid var(--line);vertical-align:top}
tr:hover td{background:#f8faf8}
.pill{display:inline-block;padding:3px 10px;border-radius:999px;font:600 12px Inter}
.pill.active{background:#e6f3e7;color:#2f7d3a}.pill.paused{background:#fbf0d8;color:#996c12}.pill.cancelled{background:#f2e3e1;color:#9a4034}.pill.scheduled{background:#eef1f6;color:#46546e}.pill.skipped{background:#efe9df;color:#6f6557}.pill.paid{background:#e6f3e7;color:#2f7d3a}
.empty{text-align:center;color:var(--muted);padding:50px 20px}
.sub-card{border:1px solid var(--line);border-radius:14px;padding:20px;margin-bottom:16px;background:var(--paper)}
.sub-card .top{display:flex;justify-content:space-between;align-items:start;gap:12px;flex-wrap:wrap}
.sub-card h3{margin:0;font-size:21px}
.sub-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}
.note{background:#f1f7f2;border:1px solid #cfe3d5;border-radius:12px;padding:14px 16px;font-size:14px;color:#2f5540}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(120%);background:var(--ink);color:#fff;padding:13px 22px;border-radius:999px;font-weight:500;box-shadow:var(--shadow);z-index:200;transition:transform .3s;max-width:90vw}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.err{background:var(--rust)}
.modal-bg{position:fixed;inset:0;background:rgba(31,42,45,.45);display:none;place-items:center;z-index:100;padding:20px}
.modal-bg.show{display:grid}
.modal{background:var(--paper);border-radius:var(--radius);padding:30px;max-width:430px;width:100%;box-shadow:var(--shadow);max-height:calc(100vh - 40px);overflow-y:auto}
.loc-checks{display:flex;flex-wrap:wrap;gap:8px}
.loc-chip{display:inline-flex;align-items:center;gap:7px;border:1.5px solid var(--line);border-radius:999px;padding:6px 13px;font-size:13px;cursor:pointer;background:#fff;user-select:none;transition:.15s}
.loc-chip input{width:auto;margin:0;accent-color:var(--green)}
.loc-chip.off{opacity:.5;background:#f5f4f1}
.modal h3{font-size:24px}
.seg{display:flex;background:#eef0ee;border-radius:10px;padding:4px;margin-bottom:18px}
.seg button{flex:1;border:none;background:none;padding:9px;border-radius:7px;font:600 14px Inter;color:var(--muted);cursor:pointer}
.seg button.on{background:#fff;color:var(--ink);box-shadow:var(--shadow)}
footer{border-top:1px solid var(--line);padding:30px 0;color:var(--muted);font-size:13px;text-align:center}
.muted{color:var(--muted)}.center{text-align:center}
@media(max-width:860px){.layout{grid-template-columns:1fr}.membership{position:static}.grid2{grid-template-columns:1fr}.metrics{grid-template-columns:repeat(2,1fr)}.nav-links a.hideable{display:none}.table-scroll{overflow-x:auto}.supporting img{width:100%}}
</style>
</head>
<body>
<header class="nav"><div class="wrap nav-in">
  <div class="brand" onclick="go('/')">
    <img src="https://res.cloudinary.com/table22/image/upload/q_auto:best,h_60/v1/partners/greys-fine-cheeses/greys_logo.png" alt="Greys Fine Cheeses" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
    <span class="fallback" style="display:none">GREYS</span>
  </div>
  <nav class="nav-links" id="navLinks"></nav>
</div></header>

<main id="app"></main>

<footer><div class="wrap">Greys Fine Cheeses · Cheese Club · Memphis · Nashville · Franklin</div></footer>

<div class="toast" id="toast"></div>
<div class="modal-bg" id="modalBg"><div class="modal" id="modal"></div></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
/* ====== CONFIG ====== */
const SUPABASE_URL = "https://vdvtrevhqalmjwhjhjug.supabase.co";
const SUPABASE_KEY = "sb_publishable_LnlevWReed7K8cFk_f_Mxg_UywktQ5_";
const STRIPE_ENABLED = false;
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const IMG = "https://res.cloudinary.com/table22/image/upload/";
const GAL = "c_fill,g_center,w_640,h_480,q_auto,f_auto/v1/";
const GALLERY = [
  "partners/greys-fine-cheese/offerings/greys-fine-cheese-club/441575786_422341607080229_2985205994719362900_n.jpg",
  "partners/greys-fine-cheeses/offerings/greys-fine-cheese-club/post590411685_18094464673937789.jpg",
  "partners/greys-fine-cheese/offerings/greys-fine-cheese-club/cheeseclubTable22.jpg",
  "partners/greys-fine-cheese/offerings/greys-fine-cheese-club/Cheese_log.jpg",
  "partners/greys-fine-cheeses/offerings/greys-fine-cheese-club/post590405251_18091387513937789.jpg",
  "partners/greys-fine-cheese/offerings/greys-fine-cheese-club/439569687_1921132191654595_8560397392716441394_n.jpg",
  "partners/greys-fine-cheese/offerings/greys-fine-cheese-club/UK_visit_Stichelton.jpg"
].map(p=>IMG+GAL+p);
const OWNER_IMG = IMG+"c_fill,g_center,w_560,h_430,q_auto,f_auto/v1/partners/greys-fine-cheeses/Cheese_Cave_Spain.webp";

/* ====== STATE ====== */
const S = { session:null, member:null, clubs:[], fulfillment:[], cohorts:[], draft:null };
let homeSelected = null;
let ADMIN_TAB = 'ov';
const money = c => "$" + (c/100).toFixed(0);
const money2 = c => "$" + (c/100).toFixed(2);
const TAX_RATE = 0.0975, PROCESSING_RATE = 0.08;
function pricing(base){const tax=Math.round(base*TAX_RATE);const proc=Math.round((base+tax)*PROCESSING_RATE);return{base,tax,proc,total:base+tax+proc};}
const $ = (h)=>{const t=document.createElement('template');t.innerHTML=h.trim();return t.content.firstElementChild;};
function toast(msg,err){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show'+(err?' err':'');setTimeout(()=>t.className='toast',3200);}
function go(path){location.hash = '#'+path;}
function esc(s){return (s==null?'':s).toString().replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function mfOnly(club){return !!club.pickup_only;}
function allowedFulfillment(club){ return club.pickup_only ? S.fulfillment.filter(f=>f.type==='pickup') : S.fulfillment; }

/* ====== DATA ====== */
async function loadCatalog(){
  if(S.clubs.length) return;
  const [c,f,co] = await Promise.all([
    sb.from('cc_clubs').select('*').eq('active',true).order('sort_order'),
    sb.from('cc_fulfillment_options').select('*').eq('active',true).order('sort_order'),
    sb.from('cc_cohorts').select('*').order('month')
  ]);
  S.clubs=c.data||[]; S.fulfillment=f.data||[]; S.cohorts=co.data||[];
}
// The cohort currently open for ordering: status 'open' AND cutoff not passed.
// Returns null once the hard cutoff (7 days before the 2nd-Wednesday pickup)
// has passed and no future cohort is open yet — the server enforces this too.
function nextCohort(){ const today=new Date().toISOString().slice(0,10); return S.cohorts.find(c=>c.status==='open' && c.order_deadline>=today)||null; }
async function refreshMember(){
  if(!S.session){S.member=null;return;}
  const {data}=await sb.from('cc_members').select('*').eq('id',S.session.user.id).maybeSingle();
  S.member=data;
}

/* ====== AUTH ====== */
async function doSignup(email,password,full_name,phone){
  const r = await fetch(SUPABASE_URL+'/functions/v1/cc-signup',{
    method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+SUPABASE_KEY,'apikey':SUPABASE_KEY},
    body:JSON.stringify({email,password,full_name,phone})
  });
  const j = await r.json();
  if(!r.ok || j.error) throw new Error(j.error||'Could not create account.');
  const {error}=await sb.auth.signInWithPassword({email,password});
  if(error) throw error;
}
async function doLogin(email,password){
  const {error}=await sb.auth.signInWithPassword({email,password});
  if(error) throw new Error('Incorrect email or password.');
}
async function logout(){ await sb.auth.signOut(); S.session=null;S.member=null; go('/'); toast('Signed out.'); }

/* ====== ROUTER ====== */
async function render(){
  await loadCatalog();
  renderNav();
  const hash = location.hash.replace(/^#/,'')||'/';
  const parts = hash.split('/'); const seg=parts[1], arg=parts[2];
  const app = document.getElementById('app');
  window.scrollTo(0,0);
  if(!seg){ app.innerHTML=''; app.append(viewHome()); return; }
  if(seg==='join'){ app.innerHTML=''; app.append(viewJoin(arg)); return; }
  if(seg==='account'){ if(!S.session) return go('/login'); await refreshMember(); app.innerHTML=''; app.append(await viewAccount()); return; }
  if(seg==='admin'){ if(!S.session) return go('/login'); await refreshMember(); if(!(S.member&&S.member.is_admin)){app.innerHTML='';app.append(viewNoAdmin());return;} app.innerHTML=''; app.append(await viewAdmin()); return; }
  if(seg==='login'){ app.innerHTML=''; app.append(viewLogin()); return; }
  app.innerHTML=''; app.append(viewHome());
}
function renderNav(){
  const n=document.getElementById('navLinks'); n.innerHTML='';
  n.append($(`<a class="hideable" onclick="go('/')">The Club</a>`));
  if(S.session){
    if(S.member&&S.member.is_admin) n.append($(`<a onclick="go('/admin')">Partner Portal</a>`));
    n.append($(`<a onclick="go('/account')">My Membership</a>`));
    n.append($(`<a class="btn btn-ghost btn-sm" onclick="logout()">Sign out</a>`));
  }else{
    n.append($(`<a onclick="go('/login')">Sign in</a>`));
    n.append($(`<a class="btn btn-primary btn-sm" onclick="go('/')">Become a member</a>`));
  }
}

/* ====== VIEW: HOME (Table22-style) ====== */
function viewHome(){
  const el=$(`<div class="wrap" style="padding-top:14px"></div>`);
  el.append($(`<div class="rating"><span class="stars">★★★★☆</span> 4.4 · based on 32 reviews</div>`));
  el.append($(`<div class="home-head"><h2>Choose your membership</h2><p>Every membership is month-to-month — pause, skip, or cancel anytime.</p></div>`));

  const grid=$(`<div class="clubgrid"></div>`);
  S.clubs.forEach(c=>{
    const card=$(`<div class="ccard ${c.slug==='off-the-vine'?'wine':''}">
      <div class="ccimg">${c.badge?`<span class="cbadge">${esc(c.badge)}</span>`:''}<img loading="lazy" alt="${esc(c.name)}"></div>
      <div class="body">
        <h3>${esc(c.name)}</h3>
        <div class="cprice">${money(c.monthly_price_cents)}<span>/mo</span></div>
        <p class="cdesc">${esc(c.description||'')}</p>

function viewJoin(slug){
  const club = S.clubs.find(c=>c.slug===slug);

    const firstSel=(ffOpts.find(f=>!f.coming_soon)||ffOpts[0]||{}).id;
    S.draft={club_id:club.id, fulfillment_id:firstSel, is_gift:false, gift_sender_name:'', gift_recipient_email:'', gift_note:'', delivery_instructions:''};
  }

  if(!S.draft.address) S.draft.address={name:'',street:'',city:'',state:'',zip:''};

  const left=$(`<div></div>`);
  const fcard=$(`<div class="card" style="margin-bottom:22px"><h3 style="font-size:19px">How would you like to receive it?</h3>${mfOnly(club)?'<p class="muted" style="font-size:13px;margin-top:0">This membership is in-store pickup only (21+).</p>':''}<div class="radio-row" id="ffr"></div></div>`);

      ffr.append($(`<label class="opt disabled"><input type="radio" disabled><div class="meta"><b>${esc(f.label)}</b><small>${esc(f.address||'')}</small></div><div class="soon">Coming soon</div></label>`));

    const o=$(`<label class="opt ${sel?'sel':''}"><input type="radio" name="ff" ${sel?'checked':''}><div class="meta"><b>${esc(f.label)}</b><small>${esc(f.address||'')}</small></div><div class="amt">${amt}</div></label>`);

  });
  left.append(fcard);
  const ff=ffOpts.find(x=>x.id===S.draft.fulfillment_id);
  const ffType = ff?ff.type:'pickup';

  if(ff && (ffType==='delivery'||ffType==='shipping')){
    const A=S.draft.address;

    const af=ac.querySelector('#addrf');
    const mk=(id,label,type)=>{const l=$(`<label class="fld"><span>${label}</span><input id="af_${id}" ${type?`type="${type}"`:''} value="${esc(A[id]||'')}"></label>`);l.querySelector('input').addEventListener('input',e=>{A[id]=e.target.value;});return l;};
    af.append(mk('name','Full name'));
    af.append(mk('street','Street address'));
    const row=$(`<div style="display:grid;grid-template-columns:2fr 1fr 1fr;gap:10px"></div>`);
    row.append(mk('city','City')); row.append(mk('state','State')); row.append(mk('zip','ZIP'));
    af.append(row);
    if(ffType==='delivery'){
      const d=$(`<label class="fld"><span>Delivery instructions (optional)</span><textarea rows="2" id="dins">${esc(S.draft.delivery_instructions)}</textarea></label>`);
      d.querySelector('#dins').addEventListener('input',e=>S.draft.delivery_instructions=e.target.value);
      af.append(d);
    }
    if(ffType==='shipping'){
      const rb=$(`<button class="btn btn-ghost btn-sm" style="margin-top:2px">Get shipping rates</button>`);

        rb.disabled=true;rb.textContent='Getting rates…';
        try{
          const r=await fetch(SUPABASE_URL+'/functions/v1/cc-shipstation',{method:'POST',headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY},body:JSON.stringify({action:'rate',to_zip:A.zip,to_state:A.state,to_city:A.city,weight_lb:club.ship_weight_lb||3})});
          const j=await r.json();
          if(j.configured===false){toast("Shipping isn't set up yet.",true);}
          else if(!j.ok||!j.rates){toast(j.error||'Could not get rates.',true);}
          else{S.draft.rates=j.rates;S.draft.rate=null;el.replaceWith(viewJoin(slug));return;}
        }catch(e){toast('Could not get rates.',true);}
        rb.disabled=false;rb.textContent='Get shipping rates';
      });
      af.append(rb);
      if(S.draft.rates){
        const rl=$(`<div class="radio-row" style="margin-top:14px"></div>`);
        if(!S.draft.rates.length) rl.append($(`<div class="muted" style="font-size:13px">No rates found for that address.</div>`));
        S.draft.rates.forEach(rt=>{
          const sel=S.draft.rate&&S.draft.rate.service_code===rt.service_code;
          const d=rt.days?('Est. '+esc(String(rt.days))+(/^\d+$/.test(String(rt.days))?' days':'')):'';
          const o=$(`<label class="opt ${sel?'sel':''}"><input type="radio" ${sel?'checked':''}><div class="meta"><b>${esc(rt.carrier)} · ${esc(rt.service)}</b><small>${d}</small></div><div class="amt">${money2(rt.amount_cents)}</div></label>`);
          o.addEventListener('click',()=>{S.draft.rate=rt;el.replaceWith(viewJoin(slug));});
          rl.append(o);
        });
        af.append(rl);
      }
    }
    left.append(ac);
  }

  const gcard=$(`<div class="card" style="margin-bottom:22px"><label class="opt ${S.draft.is_gift?'sel':''}"><input type="checkbox" id="giftck" ${S.draft.is_gift?'checked':''}><div class="meta"><b>This is a gift 🎁</b><small>We'll send the recipient a welcome note.</small></div></label><div id="giftfields"></div></div>`);
  gcard.querySelector('#giftck').addEventListener('change',e=>{S.draft.is_gift=e.target.checked; el.replaceWith(viewJoin(slug));});
  if(S.draft.is_gift){
    const gf=gcard.querySelector('#giftfields'); gf.style.marginTop='14px';
    gf.append($(`<label class="fld"><span>Your name (gift sender)</span><input id="gsn" value="${esc(S.draft.gift_sender_name)}"></label>`));
    gf.append($(`<label class="fld"><span>Recipient email</span><input id="gre" type="email" value="${esc(S.draft.gift_recipient_email)}"></label>`));
    gf.append($(`<label class="fld"><span>Gift note</span><textarea rows="2" id="gnt">${esc(S.draft.gift_note)}</textarea></label>`));
    gf.querySelector('#gsn').addEventListener('input',e=>S.draft.gift_sender_name=e.target.value);
    gf.querySelector('#gre').addEventListener('input',e=>S.draft.gift_recipient_email=e.target.value);
    gf.querySelector('#gnt').addEventListener('input',e=>S.draft.gift_note=e.target.value);
  }
  left.append(gcard);
  const authCard=$(`<div class="card" id="authCard"></div>`); left.append(authCard);
  renderJoinAuth(authCard, club, slug);
  grid.append(left);

  const fee = ffType==='delivery'?(ff.surcharge_cents||0):(ffType==='shipping'?((S.draft.rate&&S.draft.rate.amount_cents)||0):0);
  const feeLabel = ffType==='shipping' ? (S.draft.rate?money2(fee):'Address & rate needed') : (fee?money2(fee):'Included');
  const P=pricing(club.monthly_price_cents+fee);
  const nc=nextCohort();
  const right=$(`<div><div class="card summary">
    <h3 style="font-size:19px">Order summary</h3>
    <div class="row"><span>${esc(club.name)}</span><span>${money2(club.monthly_price_cents)}</span></div>
    <div class="row"><span>${esc(ff?ff.label:'Fulfillment')}${ffType==='shipping'&&S.draft.rate?' ('+esc(S.draft.rate.service)+')':''}</span><span>${feeLabel}</span></div>
    <div class="row"><span>Sales tax (9.75%)</span><span>${money2(P.tax)}</span></div>
    <div class="row"><span>Processing fee (8%)</span><span>${money2(P.proc)}</span></div>
    <div class="row total"><span>Total / month</span><span>${money2(P.total)}</span></div>
    <p class="muted" style="font-size:13px;margin:14px 0 0">First order: <b>${nc?fmtMonth(nc.month):'next cohort'}</b>. Billed monthly. Pause, skip, or cancel anytime.</p>
  </div></div>`);
  grid.append(right); el.append(grid);
  return el;
}

        form.append(b);
      }
    };
    seg.querySelectorAll('button').forEach(btn=>btn.addEventListener('click',()=>{seg.querySelectorAll('button').forEach(x=>x.classList.remove('on'));btn.classList.add('on');mode=btn.dataset.m;draw();}));
    draw();

async function completeCheckout(club, btn){
  const ff=S.fulfillment.find(x=>x.id===S.draft.fulfillment_id);
  const type=ff?ff.type:'pickup';
  const A=S.draft.address||{};
  if(type==='delivery'||type==='shipping'){
    if(!A.name||!A.street||!A.city||!A.state||!A.zip){toast('Please enter your full '+(type==='shipping'?'shipping':'delivery')+' address.',true);return;}
  }
  if(type==='shipping' && !(S.draft.rate&&S.draft.rate.amount_cents)){toast('Please choose a shipping rate.',true);return;}
  if(!nextCohort()){toast('Ordering for this month has closed (cutoff is 7 days before pickup). Please check back when the next club opens.',true);return;}
  if(btn){btn.disabled=true;btn.textContent='Starting…';}
  const fee = type==='delivery'?(ff.surcharge_cents||0):(type==='shipping'?S.draft.rate.amount_cents:0);
  if(STRIPE_ENABLED){
    try{
      const {data:{session}}=await sb.auth.getSession();
      const r=await fetch(SUPABASE_URL+'/functions/v1/cc-checkout',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+session.access_token,'apikey':SUPABASE_KEY},body:JSON.stringify({club_id:club.id,fulfillment_option_id:S.draft.fulfillment_id,origin:location.origin+location.pathname})});
      const j=await r.json(); if(j.url){location.href=j.url;return;}
    }catch(e){}
  }
  try{
    const amount=pricing(club.monthly_price_cents+fee).total;
    const rec={member_id:S.session.user.id,club_id:club.id,fulfillment_option_id:S.draft.fulfillment_id,delivery_instructions:S.draft.delivery_instructions||null,is_gift:S.draft.is_gift,gift_sender_name:S.draft.is_gift?S.draft.gift_sender_name:null,gift_recipient_email:S.draft.is_gift?S.draft.gift_recipient_email:null,gift_note:S.draft.is_gift?S.draft.gift_note:null};
    if(type==='delivery'||type==='shipping'){rec.ship_name=A.name;rec.ship_street=A.street;rec.ship_city=A.city;rec.ship_state=A.state;rec.ship_zip=A.zip;rec.delivery_address=[A.street,A.city,A.state,A.zip].filter(Boolean).join(', ');}
    if(type==='shipping'){rec.ship_carrier=S.draft.rate.carrier;rec.ship_service=S.draft.rate.service;rec.ship_amount_cents=S.draft.rate.amount_cents;rec.ship_carrier_id=S.draft.rate.carrier_id;rec.ship_service_code=S.draft.rate.service_code;}
    const {data:sub,error}=await sb.from('cc_subscriptions').insert(rec).select().single();
    if(error) throw error;
    const nc=nextCohort();
    if(nc){
      const {data:ord}=await sb.from('cc_orders').insert({subscription_id:sub.id,cohort_id:nc.id,amount_cents:amount,status:'scheduled'}).select().single();
      if(ord && type==='shipping'){ try{ const {data:{session}}=await sb.auth.getSession(); fetch(SUPABASE_URL+'/functions/v1/cc-shipstation',{method:'POST',headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+session.access_token},body:JSON.stringify({action:'sync_order',order_id:ord.id})}); }catch(e){} }
    }
    S.draft=null; showWelcome(club);
  }catch(e){ toast(e.message||'Something went wrong.',true); if(btn){btn.disabled=false;btn.textContent='Become a member →';} }
}

// Calls a Cheese Club admin edge function with the operator's session JWT.
async function ccFn(slug, payload){
  const {data:{session}}=await sb.auth.getSession();
  const res=await fetch(SUPABASE_URL+'/functions/v1/'+slug,{method:'POST',
    headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+(session?session.access_token:SUPABASE_KEY)},
    body:JSON.stringify(payload||{})});
  return res;
}
async function ccFnJson(slug, payload){ const r=await ccFn(slug,payload); let j={}; try{j=await r.json();}catch(e){} if(!r.ok||j.error) throw new Error(j.error||('Request failed ('+r.status+')')); return j; }
// Current open cohort's month (yyyy-mm-dd), or this month if none is open.
function adminDefaultMonth(){ const c=S.cohorts.find(x=>x.status==='open')||S.cohorts[S.cohorts.length-1]; if(c) return c.month; const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-01'; }
function ymToDate(v){ return /^\d{4}-\d{2}$/.test(v)? v+'-01' : v; }
// 2nd Wednesday (pickup day) of a 'YYYY-MM' or 'YYYY-MM-01' month.
function ccSecondWednesday(ym){ const [y,m]=ym.split('-').map(Number); const first=new Date(Date.UTC(y,m-1,1)); const dow=first.getUTCDay(); const fw=1+((3-dow+7)%7); return new Date(Date.UTC(y,m-1,fw+7)); }
// Opens a clean, print-optimized roster sheet for the given month (yyyy-mm[-01]),
// grouped by pickup/fulfillment location with a check-off column for pickup day.
async function printRoster(month, onlyLabels){
  let j; try{ j=await ccFnJson('cc-admin',{action:'roster',month}); }catch(e){ toast(e.message,true); return; }
  let rows=j.roster||[];
  const filtered=Array.isArray(onlyLabels)&&onlyLabels.length;
  if(filtered){ const set=new Set(onlyLabels); rows=rows.filter(r=>set.has(r.fulfillment_label||'Unassigned')); }
  const locNote=filtered?onlyLabels.join(' · '):'All locations';
  const pickup=ccSecondWednesday(month);
  const pickupLabel=pickup.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric',timeZone:'UTC'});
  const monthLabel=new Date(ymToDate(month)+'T00:00:00').toLocaleDateString('en-US',{month:'long',year:'numeric'});
  const e2=s=>(s==null?'':String(s)).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  const groups={}; rows.forEach(r=>{const k=r.fulfillment_label||'Unassigned';(groups[k]=groups[k]||[]).push(r);});
  let bodyHtml='';
  Object.keys(groups).sort().forEach(k=>{
    const list=groups[k].sort((a,b)=>((a.full_name||a.email||'').localeCompare(b.full_name||b.email||'')));
    bodyHtml+=`<h2>${e2(k)} <span class="cnt">· ${list.length}</span></h2><table><thead><tr><th class="chk">✓</th><th>Member</th><th>Tier</th><th>Order</th><th class="note">Notes</th></tr></thead><tbody>`;
    list.forEach(r=>{bodyHtml+=`<tr><td class="chk"></td><td><b>${e2(r.full_name||'—')}</b><div class="sub">${e2(r.email)}${r.phone?' · '+e2(r.phone):''}</div></td><td>${e2(r.club_name)}</td><td>${e2(r.order_status||'—')}</td><td class="note"></td></tr>`;});
    bodyHtml+='</tbody></table>';
  });
  if(!rows.length) bodyHtml='<p style="margin-top:24px">No active members for this month.</p>';
  const html=`<!doctype html><html><head><meta charset="utf-8"><title>Cheese Club Roster — ${monthLabel}</title><style>
    *{box-sizing:border-box}
    body{font:14px/1.4 -apple-system,Segoe UI,Roboto,Arial,sans-serif;color:#111;margin:28px}
    .toolbar{margin-bottom:14px}
    .toolbar button{font:14px sans-serif;padding:8px 16px;background:#1f5137;color:#fff;border:none;border-radius:6px;cursor:pointer}
    header{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:3px solid #1f5137;padding-bottom:10px;margin-bottom:8px}
    h1{font:600 22px Georgia,serif;color:#1f5137;margin:0}
    .meta{text-align:right;font-size:13px;color:#333}
    .meta b{color:#111}
    h2{font:600 15px Georgia,serif;margin:20px 0 6px;color:#163b28;border-left:4px solid #c99a3f;padding-left:8px}
    h2 .cnt{color:#888;font-weight:400;font-size:13px}
    table{width:100%;border-collapse:collapse;margin-bottom:6px}
    th,td{border:1px solid #ccc;padding:6px 8px;text-align:left;vertical-align:top}
    th{background:#f2f1ee;font-size:11px;text-transform:uppercase;letter-spacing:.03em}
    td.chk,th.chk{width:30px;text-align:center}
    td.chk{height:28px}
    th.note,td.note{width:150px}
    .sub{font-size:11px;color:#666}
    tbody tr{page-break-inside:avoid}
    footer{margin-top:18px;font-size:11px;color:#999;text-align:center;border-top:1px solid #eee;padding-top:8px}
    @media print{body{margin:12mm}.toolbar{display:none}}
  </style></head><body>
    <div class="toolbar"><button onclick="window.print()">Print / Save as PDF</button></div>
    <header><h1>Greys Fine Cheeses — Cheese Club</h1><div class="meta"><div><b>${monthLabel}</b> pickup roster</div><div>Pickup: <b>${pickupLabel}</b></div><div>${e2(locNote)}</div><div>${rows.length} active membership${rows.length===1?'':'s'}</div></div></header>
    ${bodyHtml}
    <footer>Generated ${new Date().toLocaleString('en-US')} · Greys Fine Cheeses Cheese Club</footer>
  </body></html>`;
  const w=window.open('','_blank');
  if(!w){toast('Allow pop-ups to open the printable roster.',true);return;}
  w.document.write(html); w.document.close(); w.focus();
}
// Admin: add or edit a club. Writes go through the cc_clubs_admin_write RLS
// policy (cc_is_admin()), so this uses the operator's own session.
function editClub(c,onSaved){
  const isNew=!c.id;
  const m=document.getElementById('modal');
  const ta='width:100%;font:inherit;padding:10px;border:1.5px solid var(--line);border-radius:10px';
  const row=(label,inner)=>`<label class="fld"><span>${label}</span>${inner}</label>`;

  m.innerHTML=`<h3>${isNew?'Add a club':'Edit club'}</h3>`+(isNew?'':`<p class="muted" style="font-size:13px;margin-top:-6px">${esc(c.slug||'')}</p>`);
  const wrap=$(`<div style="max-height:62vh;overflow:auto;padding-right:4px"></div>`);
  wrap.innerHTML=
    row('Name',`<input id="ec_name" value="${esc(c.name||'')}">`)+
    (isNew?row('Slug (URL id)',`<input id="ec_slug" placeholder="auto-generated from name">`):'')+
    row('Price (USD / month)',`<input id="ec_price" type="number" step="0.01" min="0" value="${(c.monthly_price_cents||0)/100}">`)+
    row('Tagline',`<input id="ec_tag" value="${esc(c.tagline||'')}">`)+
    row('Badge',`<input id="ec_badge" value="${esc(c.badge||'')}">`)+
    row('Availability note',`<input id="ec_avail" value="${esc(c.availability||'')}">`)+
    row('Image URL',`<input id="ec_img" value="${esc(c.image_url||'')}" placeholder="https://…">`)+
    row('Accent color',`<input id="ec_accent" type="color" value="${esc(c.accent||'#1f5137')}" style="width:56px;height:38px;padding:2px;border:1.5px solid var(--line);border-radius:8px">`)+
    row('Sort order',`<input id="ec_sort" type="number" step="1" value="${c.sort_order||0}">`)+
    row('Description',`<textarea id="ec_desc" rows="3" style="${ta}">${esc(c.description||'')}</textarea>`)+
    row(`What's inside`,`<textarea id="ec_inside" rows="3" style="${ta}">${esc(c.whats_inside||'')}</textarea>`)+
    `<label class="opt" style="margin-top:6px"><input id="ec_active" type="checkbox" ${c.active?'checked':''}><div class="meta"><b>Active</b><small>Visible on the storefront</small></div></label>`+
    `<label class="opt"><input id="ec_pickup" type="checkbox" ${c.pickup_only?'checked':''}><div class="meta"><b>Pickup only</b><small>No delivery or shipping</small></div></label>`;
  m.append(wrap);
  const save=$(`<button class="btn btn-primary" style="width:100%;margin-top:12px">${isNew?'Create club':'Save changes'}</button>`);
  save.addEventListener('click',async()=>{
    const price=Math.round(parseFloat(wrap.querySelector('#ec_price').value||'0')*100);
    if(!(price>=0)){toast('Enter a valid price.',true);return;}
    const name=wrap.querySelector('#ec_name').value.trim();
    if(!name){toast('Name is required.',true);return;}
    const patch={
      name,
      monthly_price_cents:price,
      tagline:wrap.querySelector('#ec_tag').value.trim()||null,
      badge:wrap.querySelector('#ec_badge').value.trim()||null,
      availability:wrap.querySelector('#ec_avail').value.trim()||null,
      image_url:wrap.querySelector('#ec_img').value.trim()||null,
      accent:wrap.querySelector('#ec_accent').value,
      sort_order:parseInt(wrap.querySelector('#ec_sort').value,10)||0,
      description:wrap.querySelector('#ec_desc').value.trim()||null,
      whats_inside:wrap.querySelector('#ec_inside').value.trim()||null,
      active:wrap.querySelector('#ec_active').checked,
      pickup_only:wrap.querySelector('#ec_pickup').checked
    };
    save.disabled=true;save.textContent='Saving…';
    let error;

      if(!patch.slug){toast('Could not derive a slug — enter one.',true);save.disabled=false;save.textContent='Create club';return;}
      ({error}=await sb.from('cc_clubs').insert(patch));
    }else{
      ({error}=await sb.from('cc_clubs').update(patch).eq('id',c.id));
    }
    if(error){toast(error.message,true);save.disabled=false;save.textContent=isNew?'Create club':'Save changes';return;}

    closeModal();toast(isNew?'Club added.':'Club updated.');if(onSaved)onSaved();
  });
  m.append(save);

  document.getElementById('modalBg').classList.add('show');
}

    const patch={
      club_id:wrap.querySelector('#es_club').value,
      fulfillment_option_id:wrap.querySelector('#es_ff').value,
      status,
      is_gift:wrap.querySelector('#es_gift').checked,
      cancelled_at: status==='cancelled' ? (s.cancelled_at||new Date().toISOString()) : null,
      paused_until: status==='paused' ? ((wrap.querySelector('#es_paused').value||'')?wrap.querySelector('#es_paused').value+'-01':null) : null,
    };
    save.disabled=true;save.textContent='Saving…';
    const {error}=await sb.from('cc_subscriptions').update(patch).eq('id',s.id);
    if(error){toast(error.message,true);save.disabled=false;save.textContent='Save changes';return;}
    closeModal();toast('Subscription updated.');render();
  });
  m.append(save);
  m.append($(`<button class="btn btn-ghost" style="width:100%;margin-top:8px" onclick="closeModal()">Cancel</button>`));
  document.getElementById('modalBg').classList.add('show');
}
async function createLabel(o, btn, origin){
  btn.disabled=true;btn.textContent='Creating…';
  try{
    const {data:{session}}=await sb.auth.getSession();
    const r=await fetch(SUPABASE_URL+'/functions/v1/cc-shipstation',{method:'POST',headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+session.access_token},body:JSON.stringify({action:'label',order_id:o.id,origin:origin||'memphis'})});
    const j=await r.json();
    if(j.configured===false){toast('ShipStation is not configured.',true);}
    else if(!j.ok){toast(j.error||'Could not create label.',true);}
    else{ if(j.label_url) window.open(j.label_url,'_blank'); toast('Label created'+(j.tracking?' · '+j.tracking:'')+'.'); render(); return; }
  }catch(e){toast('Could not create label.',true);}
  btn.disabled=false;btn.textContent='Create label';
}
function viewNoAdmin(){return $(`<div class="wrap" style="padding:60px 0"><div class="empty">This area is for store operators only.<br><br><a class="btn btn-primary" onclick="go('/account')">Go to my membership</a></div></div>`);}

/* ====== BOOT ====== */
async function onAuthed(){const {data}=await sb.auth.getSession();S.session=data.session;await refreshMember();renderNav();}
document.getElementById('modalBg').addEventListener('click',e=>{if(e.target.id==='modalBg')closeModal();});
window.addEventListener('hashchange',render);
(async()=>{
  const {data}=await sb.auth.getSession();S.session=data.session;if(S.session)await refreshMember();
  const qp=new URLSearchParams(location.search);
  if(qp.get('checkout')==='success'){ history.replaceState({},'',location.pathname+'#/account'); toast('Payment received — welcome to the club!'); }
  if(qp.get('checkout')==='cancel'){ history.replaceState({},'',location.pathname); }
  await render();
})();
</script>
